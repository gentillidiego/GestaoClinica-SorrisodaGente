{% extends "base.html" %}

{% block title %}Login - Sorriso da Gente{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at top right, hsl(var(--primary) / 0.08), transparent 45%), linear-gradient(180deg, #ffffff 0%, #f5f8fd 100%);">
    <div class="card animate-fade" style="width: 100%; max-width: 460px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='logo_sorriso_horizontal.png') }}" alt="Sorriso da Gente"
                 style="max-width: 210px; height: auto;">
            <h1 style="font-family: var(--font-heading); font-size: 1.7rem; font-weight: 800; color: hsl(var(--primary)); margin-top: 1.25rem;">
                Entrar no sistema
            </h1>
            <p style="color: hsl(var(--text-muted)); margin-top: 0.5rem; line-height: 1.6;">
                Use sua senha definitiva. Para novos acessos, utilize o fluxo de primeiro acesso abaixo.
            </p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="margin-bottom: 1rem;">
                <label for="username" class="form-label">Login</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Seu login" required autofocus>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="password" class="form-label">Senha definitiva</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">
                Entrar
            </button>
        </form>

        <div style="display: grid; gap: 0.75rem; margin-top: 1.5rem;">
            <a href="{{ url_for('auth.first_access') }}" class="btn btn-outline" style="width: 100%;">
                Primeiro acesso
            </a>
            <a href="{{ url_for('auth.forgot_password') }}" class="btn btn-outline" style="width: 100%;">
                Esqueci minha senha
            </a>
        </div>
    </div>
</div>
{% endblock %}
