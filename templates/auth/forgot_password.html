{% extends "base.html" %}

{% block title %}Esqueci Minha Senha - Sorriso da Gente{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at top left, rgba(245, 158, 11, 0.10), transparent 40%), linear-gradient(180deg, #ffffff 0%, #fffaf1 100%);">
    <div class="card animate-fade" style="width: 100%; max-width: 460px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-family: var(--font-heading); font-size: 1.65rem; font-weight: 800; color: hsl(var(--primary));">
                Esqueci minha senha
            </h1>
            <p style="color: hsl(var(--text-muted)); margin-top: 0.5rem; line-height: 1.6;">
                Informe seu login ou e-mail. Enviaremos um link temporario para redefinir a senha.
            </p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="margin-bottom: 1.5rem;">
                <label for="identifier" class="form-label">Login ou e-mail</label>
                <input type="text" name="identifier" id="identifier" class="form-control" placeholder="Seu login ou e-mail" required autofocus>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">
                Enviar link de redefinicao
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="{{ url_for('auth.login') }}" style="color: hsl(var(--primary)); text-decoration: none; font-weight: 700;">
                Voltar para o login
            </a>
        </div>
    </div>
</div>
{% endblock %}
