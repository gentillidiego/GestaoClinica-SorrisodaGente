{% extends "base.html" %}

{% block title %}Primeiro Acesso - Sorriso da Gente{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at top left, rgba(15, 118, 110, 0.10), transparent 40%), linear-gradient(180deg, #ffffff 0%, #f7fbfa 100%);">
    <div class="card animate-fade" style="width: 100%; max-width: 460px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ url_for('static', filename='logo_sorriso_horizontal.png') }}" alt="Sorriso da Gente"
                 style="max-width: 210px; height: auto;">
            <h1 style="font-family: var(--font-heading); font-size: 1.65rem; font-weight: 800; color: hsl(var(--primary)); margin-top: 1.25rem;">
                Primeiro acesso
            </h1>
            <p style="color: hsl(var(--text-muted)); margin-top: 0.5rem; line-height: 1.6;">
                Informe o login e a data de nascimento cadastrada para criar sua senha definitiva.
            </p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="margin-bottom: 1rem;">
                <label for="username" class="form-label">Login</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Seu login" required autofocus>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="birthdate" class="form-label">Data de nascimento</label>
                <input type="date" name="birthdate" id="birthdate" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">
                Validar primeiro acesso
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="{{ url_for('auth.login') }}" style="color: hsl(var(--primary)); text-decoration: none; font-weight: 700;">
                Voltar para o login
            </a>
        </div>
    </div>
</div>
{% endblock %}
