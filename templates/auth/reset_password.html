{% extends "base.html" %}

{% block title %}Redefinir Senha - Sorriso da Gente{% endblock %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 40%), linear-gradient(180deg, #ffffff 0%, #f7fbfa 100%);">
    <div class="card animate-fade" style="width: 100%; max-width: 520px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-family: var(--font-heading); font-size: 1.65rem; font-weight: 800; color: hsl(var(--primary));">
                Redefinir senha
            </h1>
            <p style="color: hsl(var(--text-muted)); margin-top: 0.5rem; line-height: 1.6;">
                Defina sua nova senha usando o link temporario enviado por e-mail.
            </p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="token" value="{{ token }}">

            <div style="margin-bottom: 1rem;">
                <label for="email" class="form-label">E-mail do cadastro</label>
                <input type="email" name="email" id="email" class="form-control" value="{{ user.email if user else '' }}" required>
            </div>

            <div style="margin-bottom: 1rem;">
                <label for="password" class="form-label">Nova senha</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Minimo de 8 caracteres" required>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="password_confirm" class="form-label">Confirmar nova senha</label>
                <input type="password" name="password_confirm" id="password_confirm" class="form-control" placeholder="Repita a senha" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">
                Salvar nova senha
            </button>
        </form>
    </div>
</div>
{% endblock %}
