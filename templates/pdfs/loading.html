<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerando PDF...</title>
    <!-- Auto refresh every 3 seconds -->
    <meta http-equiv="refresh" content="3; url={{ url_for('documents.pdf_status', task_id=task_id, filename=filename) }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f8f9fa; }
        .loader-container { text-align: center; }
        .spinner-border { width: 3rem; height: 3rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner-border text-primary" role="status"></div>
        <h4>Gerando seu documento PDF...</h4>
        <p class="text-muted">Por favor aguarde, isso pode levar alguns segundos.</p>
        <p class="text-muted small">Status: {{ status }}</p>
    </div>
</body>
</html>
