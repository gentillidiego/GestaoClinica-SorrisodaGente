{% extends "base.html" %}

{% block title %}Editar Usuário - Administração{% endblock %}

{% block content %}
<div style="max-width: 550px; margin: 4rem auto;" class="animate-fade">
    <div style="margin-bottom: 2rem;">
        <a href="{{ url_for('admin.list_users') }}"
            style="display: inline-flex; align-items: center; gap: 0.5rem; color: hsl(var(--text-muted)); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: color 0.2s;"
            onmouseover="this.style.color='hsl(var(--primary))'" onmouseout="this.style.color='hsl(var(--text-muted))'">
            <span>⬅️</span> Voltar para Usuários
        </a>
    </div>
    <div class="card" style="padding: 3rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <div style="font-size: 2.5rem; margin-bottom: 1rem;">✏️✨</div>
            <h1
                style="font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; color: hsl(var(--primary));">
                Editar Usuário</h1>
            <p style="color: hsl(var(--text-muted)); margin-top: 0.5rem;">Atualize os dados e acessos deste usuário.</p>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="margin-bottom: 1.5rem;">
                <label for="full_name" class="form-label">Nome Completo</label>
                <input type="text" name="full_name" id="full_name" class="form-control" placeholder="Ex: João da Silva"
                    value="{{ user.full_name or '' }}" required autofocus>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="username" class="form-label">Nome de Usuário (login)</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Ex: joao.silva"
                    value="{{ user.username }}" required>
            </div>

            <div style="display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:1rem; margin-bottom:1.5rem;">
                <div>
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" name="email" id="email" class="form-control" value="{{ user.email or '' }}" placeholder="email@dominio.com">
                </div>
                <div>
                    <label for="celular" class="form-label">Celular</label>
                    <input type="text" name="celular" id="celular" class="form-control" value="{{ user.celular or '' }}" placeholder="(82) 99999-9999">
                </div>
            </div>

            <div style="display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:1rem; margin-bottom:1.5rem;">
                <div>
                    <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                    <input type="date" name="data_nascimento" id="data_nascimento" class="form-control" value="{{ user.data_nascimento or '' }}">
                </div>
                <div>
                    <label for="is_first_access" class="form-label">Fluxo de Acesso</label>
                    <select name="is_first_access" id="is_first_access" class="form-control" onchange="toggleAccessMode()">
                        <option value="1" {% if user.is_first_access %}selected{% endif %}>Primeiro acesso pendente</option>
                        <option value="0" {% if not user.is_first_access %}selected{% endif %}>Senha definida agora</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="password" class="form-label">Nova Senha (deixe em branco para não alterar)</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••">
                <div id="password_help" style="margin-top:0.5rem; color:hsl(var(--text-muted)); font-size:0.82rem;">
                    Se o usuario estiver em primeiro acesso, a senha pode continuar em branco.
                </div>
            </div>

            <div style="margin-bottom: 2.5rem;">
                <label for="role" class="form-label">Nível de Acesso (Perfil)</label>
                <select name="role" id="role" class="form-control" required onchange="toggleProfessionalFields()">
                    {% for role_value, role_name in role_choices %}
                    <option value="{{ role_value }}" {% if user.role==role_value %}selected{% endif %}>{{ role_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label for="active" class="form-label">Status do Acesso</label>
                <select name="active" id="active" class="form-control" required>
                    <option value="1" {% if user.active %}selected{% endif %}>Ativo</option>
                    <option value="0" {% if not user.active %}selected{% endif %}>Inativo</option>
                </select>
            </div>

            <div id="professional_container"
                style="{% if user.role in ['clinicos', 'cme', 'radiologia', 'analises_clinicas'] %}display: grid;{% else %}display: none;{% endif %} grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                <div>
                    <label for="cns" class="form-label">CNS do Profissional</label>
                    <input type="text" name="cns" id="cns" class="form-control professional-required" placeholder="Cartão Nacional de Saúde"
                        value="{{ user.cns or '' }}">
                </div>
                <div>
                    <label for="cbo" class="form-label">CBO</label>
                    <input type="text" name="cbo" id="cbo" class="form-control professional-required" placeholder="Ex: 223208"
                        value="{{ user.cbo or '' }}">
                </div>
                <div>
                    <label for="cnes" class="form-label">CNES</label>
                    <input type="text" name="cnes" id="cnes" class="form-control" placeholder="Carga manual posterior"
                        value="{{ user.cnes or '' }}">
                </div>
                <div>
                    <label for="ine" class="form-label">INE / Equipe</label>
                    <input type="text" name="ine" id="ine" class="form-control" placeholder="Carga manual posterior"
                        value="{{ user.ine or '' }}">
                </div>
            </div>

            <div id="cro_container"
                style="{% if user.role == 'clinicos' %}display: grid;{% else %}display: none;{% endif %} grid-template-columns: 2fr 1fr; gap: 1rem; margin-bottom: 2.5rem;">
                <div>
                    <label for="cro" class="form-label">Número CRO</label>
                    <input type="text" name="cro" id="cro" class="form-control cro-required" placeholder="Ex: 12345"
                        value="{{ user.cro or '' }}">
                </div>
                <div>
                    <label for="cro_uf" class="form-label">CRO-UF</label>
                    <input type="text" name="cro_uf" id="cro_uf" class="form-control cro-required" placeholder="Ex: AL"
                        value="{{ user.cro_uf or '' }}">
                </div>
            </div>

            <div style="display: flex; gap: 1.25rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2; height: 50px;">
                    Salvar Alterações
                </button>
                <a href="{{ url_for('admin.list_users') }}" class="btn btn-outline" style="flex: 1; height: 50px;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    const professionalRoles = ['clinicos', 'cme', 'radiologia', 'analises_clinicas'];
    const dentalRoles = ['clinicos'];

    function setRequired(selector, required) {
        document.querySelectorAll(selector).forEach((field) => {
            field.required = required;
        });
    }

    function toggleProfessionalFields() {
        var role = document.getElementById('role').value;
        var professionalContainer = document.getElementById('professional_container');
        var croContainer = document.getElementById('cro_container');

        if (professionalRoles.includes(role)) {
            professionalContainer.style.display = 'grid';
            setRequired('.professional-required', true);
        } else {
            professionalContainer.style.display = 'none';
            setRequired('.professional-required', false);
        }

        if (dentalRoles.includes(role)) {
            croContainer.style.display = 'grid';
            setRequired('.cro-required', true);
        } else {
            croContainer.style.display = 'none';
            setRequired('.cro-required', false);
        }
    }

    function toggleAccessMode() {
        const firstAccess = document.getElementById('is_first_access').value === '1';
        const birthdateField = document.getElementById('data_nascimento');
        birthdateField.required = firstAccess;
    }

    toggleProfessionalFields();
    toggleAccessMode();
</script>
{% endblock %}
