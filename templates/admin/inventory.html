{% extends "base.html" %}

{% block title %}Estoque Operacional{% endblock %}

{% block content %}
<style>
/* Sistema de abas do Estoque Operacional — mesmo padrão do Prontuário */
.tabs-container { margin-top: 1rem; }

.tabs-header {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid hsl(var(--border) / 0.5);
    padding-bottom: 1px;
    overflow-x: auto;
    scrollbar-width: none;
}
.tabs-header::-webkit-scrollbar { display: none; }

.tab-btn {
    padding: 0.75rem 1.25rem;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: hsl(var(--text-muted));
    font-weight: 700;
    font-size: 0.95rem;
    font-family: var(--font-heading);
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    border-radius: var(--radius-md) var(--radius-md) 0 0;
}
.tab-btn:hover { color: hsl(var(--primary)); background: hsl(var(--primary-soft)); }
.tab-btn.active {
    color: hsl(var(--primary));
    border-bottom-color: hsl(var(--primary));
    background: rgba(var(--primary-rgb), 0.03);
}

.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.tab-loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    color: hsl(var(--primary));
}
.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid hsl(var(--primary-soft));
    border-top: 4px solid hsl(var(--primary));
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 1rem;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<div class="animate-fade">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem;">
        <div>
            <h1 class="page-title">Estoque Operacional</h1>
            <p class="page-subtitle">Materiais, lotes, validade, custo, notas fiscais e rastreabilidade clínica.</p>
        </div>
        <a class="btn btn-outline" href="{{ url_for('main.command_center') }}">Central de Comando</a>
    </div>

    <div class="tabs-container">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="switchInventoryTab(event, 'tab-overview')">Visão Geral</button>
            <button class="tab-btn" onclick="switchInventoryTab(event, 'tab-entrada')">Entrada de Mercadoria</button>
            <button class="tab-btn" onclick="switchInventoryTab(event, 'tab-materiais')">Materiais</button>
            <button class="tab-btn" onclick="switchInventoryTab(event, 'tab-lotes')">Lotes e Saldo</button>
            <button class="tab-btn" onclick="switchInventoryTab(event, 'tab-ajustes')">Ajustes e Perdas</button>
            <button class="tab-btn" onclick="switchInventoryTab(event, 'tab-notas-fiscais')">Notas Fiscais</button>
            <button class="tab-btn" onclick="switchInventoryTab(event, 'tab-fornecedores')">Fornecedores</button>
        </div>

        <div id="tab-overview" class="tab-content" data-loaded="false"></div>
        <div id="tab-entrada" class="tab-content" data-loaded="false"></div>
        <div id="tab-materiais" class="tab-content" data-loaded="false"></div>
        <div id="tab-lotes" class="tab-content" data-loaded="false"></div>
        <div id="tab-ajustes" class="tab-content" data-loaded="false"></div>
        <div id="tab-notas-fiscais" class="tab-content" data-loaded="false"></div>
        <div id="tab-fornecedores" class="tab-content" data-loaded="false"></div>
    </div>
</div>

<script>
    async function reloadInventoryTab(tabName, queryString) {
        const target = document.getElementById(tabName);
        if (!target) return;
        target.innerHTML = `
            <div class="tab-loader">
                <div class="spinner"></div>
                <p>Carregando dados...</p>
            </div>
        `;
        const baseUrl = "{{ url_for('admin.get_inventory_tab_content', tab_name='TAB_NAME') }}";
        const fetchUrl = baseUrl.replace('TAB_NAME', tabName) + (queryString ? ('?' + queryString) : '');
        try {
            const response = await fetch(fetchUrl);
            if (!response.ok) throw new Error('Falha ao recarregar conteúdo');
            target.innerHTML = await response.text();
            target.setAttribute('data-loaded', 'true');
        } catch (error) {
            target.innerHTML = `
                <div class="tab-loader" style="color: hsl(var(--danger));">
                    <p>Erro ao recarregar aba. Tente novamente.</p>
                </div>
            `;
            console.error('Erro ao recarregar aba do estoque:', error);
        }
    }

    async function switchInventoryTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }

        const target = document.getElementById(tabName);
        if (target) {
            target.style.display = "block";
            target.classList.add("active");

            if (target.getAttribute('data-loaded') === 'false') {
                target.innerHTML = `
                    <div class="tab-loader">
                        <div class="spinner"></div>
                        <p>Carregando dados...</p>
                    </div>
                `;
                try {
                    const baseUrl = "{{ url_for('admin.get_inventory_tab_content', tab_name='TAB_NAME') }}";
                    const fetchUrl = baseUrl.replace('TAB_NAME', tabName);
                    const response = await fetch(fetchUrl);
                    if (!response.ok) throw new Error('Falha ao carregar conteúdo');
                    target.innerHTML = await response.text();
                    target.setAttribute('data-loaded', 'true');
                } catch (error) {
                    target.innerHTML = `
                        <div class="tab-loader" style="color: hsl(var(--danger));">
                            <p>Erro ao carregar aba. Tente recarregar a página.</p>
                        </div>
                    `;
                    console.error('Erro no lazy loading do estoque:', error);
                }
            }
        }

        if (evt && evt.currentTarget) {
            evt.currentTarget.classList.add("active");
        } else {
            const btn = document.querySelector(`button[onclick*="'${tabName}'"]`);
            if (btn) btn.classList.add("active");
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById(hash) && document.getElementById(hash).classList.contains('tab-content')) {
                switchInventoryTab(null, hash);
                return;
            }
        }
        switchInventoryTab(null, 'tab-overview');
    });
</script>
{% endblock %}
