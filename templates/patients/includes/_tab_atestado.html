<div class="animate-fade">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h3 style="font-family: var(--font-heading); font-size: 1.25rem; color: hsl(var(--primary));">
                📜 Atestados Emitidos</h3>
            <a href="#" class="btn btn-outline"
                style="background: white;" onclick="openNovoAtestadoModal(event)">➕ Novo Atestado</a>
        </div>

        {% if atestados %}
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
            {% for cert in atestados %}
            <div class="card"
                style="padding: 1.5rem; border: 1px solid hsl(var(--border)); display: flex; flex-direction: column;">
                <div
                    style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                    <div>
                        <span
                            style="display: block; font-size: 0.75rem; font-weight: 700; color: hsl(var(--text-muted));">DATA</span>
                        <span style="font-weight: 600;">{{ (cert.data|string).split(' ')[0] if cert.data else '---' }}</span>
                    </div>
                </div>
                <div style="flex: 1; margin-bottom: 1.5rem;">
                    <div
                        style="font-size: 0.9rem; color: hsl(var(--text-muted)); white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                        {{ cert.conteudo }}
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <a href="{{ url_for('documents.pdf_atestado', patient_id=patient.id, doc_id=cert.id) }}" class="btn btn-outline"
                        style="flex: 1; justify-content: center; font-size: 0.85rem;" target="_blank">🖨️ PDF /
                        Ver</a>
                    <form action="{{ url_for('documents.delete_atestado', patient_id=patient.id, doc_id=cert.id) }}" method="POST"
                        style="display:inline;"
                        onsubmit="return confirm('Tem certeza que deseja excluir este atestado?');">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-danger"
                            style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" title="Excluir">🗑️</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div style="padding: 2rem; background: hsl(var(--bg-main)); border-radius: var(--radius-sm); text-align: center;">
            <p style="color: hsl(var(--text-muted)); italic;">Nenhum atestado emitido para este paciente.</p>
        </div>
        {% endif %}
    </div>
</div>
