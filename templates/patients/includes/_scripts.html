<script>
    function initPagination(container) {
        const paginatedLists = container.querySelectorAll('[data-paginate="true"]');
        paginatedLists.forEach(list => {
            const items = Array.from(list.children).filter(el => !el.classList.contains('no-paginate'));
            const perPage = parseInt(list.getAttribute('data-per-page')) || 5;
            if (items.length <= perPage) return;
            
            let currentPage = 1;
            const totalPages = Math.ceil(items.length / perPage);
            
            const controls = document.createElement('div');
            controls.className = 'pagination-controls';
            controls.style.cssText = 'display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; align-items: center; width: 100%;';
            
            const updateView = () => {
                items.forEach((item, index) => {
                    item.style.display = (index >= (currentPage-1)*perPage && index < currentPage*perPage) ? '' : 'none';
                });
                controls.innerHTML = `
                    <button class="btn btn-outline" style="padding: 0.4rem 0.8rem;" ${currentPage === 1 ? 'disabled' : ''}>Anterior</button>
                    <span style="font-size: 0.9rem; font-weight: 600; color: hsl(var(--text-muted));">Página ${currentPage} de ${totalPages}</span>
                    <button class="btn btn-outline" style="padding: 0.4rem 0.8rem;" ${currentPage === totalPages ? 'disabled' : ''}>Próxima</button>
                `;
                const btns = controls.querySelectorAll('button');
                if(btns[0]) btns[0].onclick = () => { if(currentPage > 1) { currentPage--; updateView(); } };
                if(btns[1]) btns[1].onclick = () => { if(currentPage < totalPages) { currentPage++; updateView(); } };
            };
            
            const insertAnchor = list.tagName.toLowerCase() === 'tbody' ? list.closest('table') : list;
            insertAnchor.parentNode.insertBefore(controls, insertAnchor.nextSibling);
            updateView();
        });
    }

    async function switchTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        
        const target = document.getElementById(tabName);
        if (target) {
            target.style.display = "block";
            target.classList.add("active");
            
            // Lazy loading logic
            if (target.getAttribute('data-loaded') === 'false') {
                target.innerHTML = `
                    <div class="tab-loader">
                        <div class="spinner"></div>
                        <p>Carregando dados...</p>
                    </div>
                `;
                try {
                    const baseUrl = "{{ url_for('patients.get_tab_content', id=patient.id, tab_name='TAB_NAME') }}";
                    const fetchUrl = baseUrl.replace('TAB_NAME', tabName);
                    
                    const response = await fetch(fetchUrl);
                    if (!response.ok) throw new Error('Falha ao carregar conteúdo');
                    const html = await response.text();
                    target.innerHTML = html;
                    target.setAttribute('data-loaded', 'true');
                    
                    if (typeof initPagination === 'function') initPagination(target);
                    if (typeof initTreatmentSpecialtyFilters === 'function') initTreatmentSpecialtyFilters(target);
                    
                    // Re-inicialização de componentes específicos se necessário
                    if (tabName === 'tab-receituario' || tabName === 'tab-atestado') {
                        // Scripts de documentos carregados dinamicamente
                    }
                } catch (error) {
                    target.innerHTML = `
                        <div class="tab-loader" style="color: hsl(var(--danger));">
                            <p>❌ Erro ao carregar aba. Tente recarregar a página.</p>
                        </div>
                    `;
                    console.error('Erro no lazy loading:', error);
                }
            }
        }
        
        if (evt && evt.currentTarget) {
            evt.currentTarget.classList.add("active");
        } else {
            const btn = document.querySelector(`button[onclick*="'${tabName}'"]`);
            if (btn) btn.classList.add("active");
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        initTreatmentSpecialtyFilters(document);
        if (window.location.hash) {
            const hash = window.location.hash.substring(1);
            if (document.getElementById(hash) && document.getElementById(hash).classList.contains('tab-content')) {
                switchTab(null, hash);
                const tabsContainer = document.querySelector('.tabs-container');
                if (tabsContainer) tabsContainer.scrollIntoView({ behavior: 'smooth' });
            } else {
                switchTab(null, 'tab-paciente');
            }
        } else {
            switchTab(null, 'tab-paciente');
        }
    });

    function filterTreatmentSigtapOptions(specialtySelect) {
        const targetSelector = specialtySelect.getAttribute('data-target');
        const sigtapSelect = targetSelector ? document.querySelector(targetSelector) : null;
        if (!sigtapSelect) return;

        const selectedSpecialty = specialtySelect.value;
        Array.from(sigtapSelect.options).forEach(option => {
            if (!option.value) {
                option.hidden = false;
                option.disabled = false;
                return;
            }
            const sameSpecialty = !selectedSpecialty || option.getAttribute('data-specialty') === selectedSpecialty;
            option.hidden = !sameSpecialty;
            option.disabled = !sameSpecialty;
        });

        const selectedOption = sigtapSelect.selectedOptions[0];
        if (selectedOption && selectedOption.disabled) {
            sigtapSelect.value = '';
        }
    }

    function initTreatmentSpecialtyFilters(container) {
        const root = container || document;
        root.querySelectorAll('.treatment-specialty-select').forEach(select => {
            if (select.dataset.specialtyFilterReady === '1') {
                filterTreatmentSigtapOptions(select);
                return;
            }
            select.dataset.specialtyFilterReady = '1';
            select.addEventListener('change', () => filterTreatmentSigtapOptions(select));
            filterTreatmentSigtapOptions(select);
        });

        root.querySelectorAll('.treatment-sigtap-select').forEach(select => {
            if (select.dataset.descriptionAutofillReady === '1') return;
            select.dataset.descriptionAutofillReady = '1';
            select.addEventListener('change', () => {
                const option = select.selectedOptions[0];
                const form = select.closest('form');
                const descriptionInput = form ? form.querySelector('input[name="descricao"]') : null;
                if (option && option.value && descriptionInput && !descriptionInput.value.trim()) {
                    descriptionInput.value = option.getAttribute('data-name') || '';
                }
            });
        });
    }

    function openAddPaymentModal(actionUrl) {
        const modal = document.getElementById('paymentModal');
        const form = document.getElementById('paymentForm');
        form.action = actionUrl;

        const canvas = document.getElementById('signature-pad-payment');
        if (canvas && typeof SignaturePad !== 'undefined' && !canvas.padInitialized) {
            const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
            document.getElementById('clear-signature-payment').addEventListener('click', () => signaturePad.clear());

            form.addEventListener('submit', function (e) {
                if (signaturePad.isEmpty()) {
                    e.preventDefault();
                    alert('Por favor, solicite a assinatura do paciente.');
                    return;
                }
                document.getElementById('assinatura_base64_payment').value = signaturePad.toDataURL();
            });

            function resizeCanvasPag() {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
                signaturePad.clear();
            }
            window.addEventListener("resize", resizeCanvasPag);
            resizeCanvasPag();
            canvas.padInitialized = true;
            setTimeout(resizeCanvasPag, 100);
        }

        modal.style.display = 'flex';
    }

    function openPatientSignModal(actionUrl, allowProxySignature = false, patientName = '', patientCpf = '') {
        const modal = document.getElementById('patientSignModal');
        const form = document.getElementById('patientSignForm');
        form.action = actionUrl;
        form.dataset.allowProxySignature = allowProxySignature ? '1' : '0';
        const identityBox = document.getElementById('patient-sign-identity');
        const identityName = document.getElementById('patient-sign-name');
        const identityCpf = document.getElementById('patient-sign-cpf');
        if (identityBox && identityName && identityCpf) {
            identityName.textContent = patientName || 'Paciente';
            identityCpf.textContent = patientCpf || 'não informado';
            identityBox.style.display = allowProxySignature ? 'block' : 'none';
        }

        const proxySection = document.getElementById('patient-proxy-signature-section');
        const proxyCheckbox = document.getElementById('patient_not_literate_modal');
        const proxyFields = document.getElementById('patient-proxy-fields');
        const proxyRequiredFields = document.querySelectorAll('.patient-proxy-required');

        function syncProxySignatureFields() {
            const proxyEnabled = allowProxySignature && proxyCheckbox && proxyCheckbox.checked;
            if (proxyFields) {
                proxyFields.style.display = proxyEnabled ? 'block' : 'none';
            }
            proxyRequiredFields.forEach((field) => {
                field.required = proxyEnabled;
                if (!proxyEnabled) {
                    field.value = '';
                }
            });
        }

        if (proxySection) {
            proxySection.style.display = allowProxySignature ? 'block' : 'none';
        }
        if (proxyCheckbox) {
            proxyCheckbox.checked = false;
            proxyCheckbox.onchange = syncProxySignatureFields;
        }
        syncProxySignatureFields();

        // Setup signature pad for patient sign modal
        const canvas = document.getElementById('signature-pad-patient');
        if (canvas && typeof SignaturePad !== 'undefined' && !canvas.padInitialized) {
            const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
            document.getElementById('clear-signature-patient').addEventListener('click', () => signaturePad.clear());

            form.addEventListener('submit', function (e) {
                const proxyAllowed = form.dataset.allowProxySignature === '1';
                const proxyChecked = proxyAllowed && document.getElementById('patient_not_literate_modal')?.checked;
                if (proxyChecked) {
                    document.getElementById('assinatura_base64_patient').value = '';
                    return;
                }
                if (signaturePad.isEmpty()) {
                    e.preventDefault();
                    alert('Por favor, assine no quadro ou clique em Cancelar.');
                    return;
                }
                document.getElementById('assinatura_base64_patient').value = signaturePad.toDataURL();
            });

            function resizeCanvas() {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
                signaturePad.clear();
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();
            canvas.padInitialized = true;

            // Call again after modal display to fix sizing issues
            setTimeout(resizeCanvas, 100);
        } else if (canvas && canvas.padInitialized) {
            // just clear it
            const clearBtn = document.getElementById('clear-signature-patient');
            if (clearBtn) clearBtn.click();
        }

        modal.style.display = 'flex';
    }

    function initClinicalDocumentType() {
        const select = document.getElementById('clinicalDocumentType');
        const atestadoFields = document.getElementById('atestadoDocumentFields');
        const declaracaoFields = document.getElementById('declaracaoDocumentFields');
        const motivo = document.getElementById('atestadoMotivo');
        const confirmation = document.getElementById('confirmouComparecimento');
        const cidSelect = document.getElementById('atestadoCid');
        const cidAuthorization = document.getElementById('cidAutorizado');
        const submit = document.getElementById('clinicalDocumentSubmit');
        if (!select || !atestadoFields || !declaracaoFields) return;

        const declarationSelected = select.value === 'declaracao_comparecimento';
        atestadoFields.style.display = declarationSelected ? 'none' : 'block';
        declaracaoFields.style.display = declarationSelected ? 'block' : 'none';
        if (motivo) motivo.required = !declarationSelected;
        if (confirmation) confirmation.required = declarationSelected;
        if (cidAuthorization) {
            cidAuthorization.required = !declarationSelected && Boolean(cidSelect && cidSelect.value);
        }
        if (submit) {
            submit.textContent = declarationSelected
                ? 'Gerar Declaração de Comparecimento'
                : 'Salvar Atestado';
        }

        if (select.dataset.documentTypeReady !== '1') {
            select.dataset.documentTypeReady = '1';
            select.addEventListener('change', initClinicalDocumentType);
        }
        initDentalCidSelection();
    }

    function initDentalCidSelection() {
        const select = document.getElementById('atestadoCid');
        const descriptionBox = document.getElementById('cidDescriptionBox');
        const descriptionText = document.getElementById('cidDescriptionText');
        const authorizationRow = document.getElementById('cidAuthorizationRow');
        const authorization = document.getElementById('cidAutorizado');
        const documentType = document.getElementById('clinicalDocumentType');
        if (!select || !descriptionBox || !authorizationRow) return;

        const selected = select.selectedOptions[0];
        const hasCid = Boolean(select.value);
        const atestadoSelected = !documentType || documentType.value === 'atestado';
        descriptionBox.style.display = hasCid && atestadoSelected ? 'block' : 'none';
        authorizationRow.style.display = hasCid && atestadoSelected ? 'flex' : 'none';
        if (descriptionText) {
            descriptionText.textContent = selected
                ? (selected.getAttribute('data-description') || '')
                : '';
        }
        if (authorization) {
            authorization.required = hasCid && atestadoSelected;
            if (!hasCid || !atestadoSelected) authorization.checked = false;
        }

        if (select.dataset.cidReady !== '1') {
            select.dataset.cidReady = '1';
            select.addEventListener('change', initDentalCidSelection);
        }
    }
</script>
