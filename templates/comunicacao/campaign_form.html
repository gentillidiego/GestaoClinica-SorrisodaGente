{% extends "base.html" %}

{% block title %}Nova Campanha{% endblock %}

{% block content %}
<div class="animate-fade">
    <h1 class="page-title">Nova Campanha</h1>
    <p class="page-subtitle">Selecione o público e o template, confirme a contagem de destinatários e envie.</p>

    <section class="card" style="padding:1.5rem; max-width:860px;">
        <form method="POST" id="campaign-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div style="margin-bottom:1rem;">
                <label class="form-label" for="name">Nome da campanha</label>
                <input class="form-control" id="name" name="name" required>
            </div>

            <div style="margin-bottom:1rem;">
                <label class="form-label" for="channel">Canal</label>
                <select class="form-control" id="channel" name="channel" required>
                    <option value="email">E-mail</option>
                    <option value="whatsapp" {% if not whatsapp_configured %}disabled{% endif %}>
                        WhatsApp{% if not whatsapp_configured %} (não configurado){% endif %}
                    </option>
                </select>
            </div>

            <div style="margin-bottom:1rem;">
                <label class="form-label" for="template_id">Template</label>
                <select class="form-control" id="template_id" name="template_id" required>
                    {% for t in templates %}
                    <option value="{{ t.id }}" data-channel="{{ t.channel }}">{{ t.name }} ({{ 'WhatsApp' if t.channel == 'whatsapp' else 'E-mail' }})</option>
                    {% endfor %}
                </select>
            </div>

            <h2 class="section-header">Público</h2>
            <div style="display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:1rem; margin-bottom:1rem;">
                <div>
                    <label class="form-label" for="municipios">Municípios</label>
                    <select class="form-control" id="municipios" name="municipios" multiple size="6">
                        {% for m in municipios %}
                        <option value="{{ m.nome }}">{{ m.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="form-label" for="bairros">Bairros</label>
                    <select class="form-control" id="bairros" name="bairros" multiple size="6">
                        {% for b in bairros %}
                        <option value="{{ b }}">{{ b }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:1rem; margin-bottom:1rem;">
                <div>
                    <label class="form-label" for="generos">Gênero</label>
                    <select class="form-control" id="generos" name="generos" multiple size="3">
                        <option value="Feminino">Feminino</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div>
                    <label class="form-label" for="idade_min">Idade mínima</label>
                    <input class="form-control" id="idade_min" name="idade_min" type="number" min="0">
                </div>
                <div>
                    <label class="form-label" for="idade_max">Idade máxima</label>
                    <input class="form-control" id="idade_max" name="idade_max" type="number" min="0">
                </div>
            </div>

            <button class="btn btn-outline" type="button" id="btn-contar-publico">Contar destinatários</button>
            <span id="contagem-publico" style="margin-left:0.75rem; font-weight:700;"></span>

            <div style="margin-top:1.5rem;">
                <button class="btn btn-outline" type="submit" name="send_now" value="">Salvar como rascunho</button>
                <button class="btn btn-primary" type="submit" name="send_now" value="1">Enviar agora</button>
            </div>
        </form>
    </section>
</div>

<script>
document.getElementById('btn-contar-publico').addEventListener('click', function () {
    var form = document.getElementById('campaign-form');
    var formData = new FormData(form);
    fetch("{{ url_for('comunicacao.audience_count') }}", { method: 'POST', body: formData })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            document.getElementById('contagem-publico').textContent = data.total + ' destinatário(s)';
        });
});
</script>
{% endblock %}
