services:
  gestaoclinica:
    build: .
    container_name: gestaosaudeoral-web
    restart: always
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-5003}:5002"
    volumes:
      - logs_oral:/app/logs
      - ${UPLOADS_HOST_PATH:-/srv/gestaosaudeoral/uploads}:/app/uploads
      - pdf_temp_oral:/app/pdf_temp
      - backups_oral:/app/backups
      - ./secrets:/run/secrets/sorriso:ro
      - ${RCLONE_CONFIG_HOST_PATH:?Configure RCLONE_CONFIG_HOST_PATH no .env}:/run/secrets/rclone/rclone.conf
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mail:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_X_ACCEL_REDIRECT=${USE_X_ACCEL_REDIRECT:-true}
      - X_ACCEL_INTERNAL_PREFIX=/_protected_exam_files/

  mail:
    build:
      context: .
      dockerfile: deploy/mail/Dockerfile
    container_name: gestaosaudeoral-mail
    restart: always
    environment:
      MAIL_DOMAIN: sorrisodagentealagoas.com
      MAIL_HOSTNAME: mail.sorrisodagentealagoas.com
      DKIM_SELECTOR: mail
    volumes:
      - ./deploy/mail/dkim:/dkim:ro
    expose:
      - "25"

  redis:
    image: redis:7-alpine
    container_name: gestaosaudeoral-redis
    restart: always
    volumes:
      - redis_data_oral:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    container_name: gestaosaudeoral-celery
    restart: always
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=2
    volumes:
      - pdf_temp_oral:/app/pdf_temp
      - logs_oral:/app/logs
      - ${UPLOADS_HOST_PATH:-/srv/gestaosaudeoral/uploads}:/app/uploads
      - backups_oral:/app/backups
      - ./secrets:/run/secrets/sorriso:ro
      - ${RCLONE_CONFIG_HOST_PATH:?Configure RCLONE_CONFIG_HOST_PATH no .env}:/run/secrets/rclone/rclone.conf
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mail:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379/0

  celery-beat:
    build: .
    container_name: gestaosaudeoral-beat
    restart: always
    command: celery -A celery_app.celery beat --loglevel=info --schedule=/app/celerybeat-schedule/celerybeat-schedule
    volumes:
      - pdf_temp_oral:/app/pdf_temp
      - logs_oral:/app/logs
      - ${UPLOADS_HOST_PATH:-/srv/gestaosaudeoral/uploads}:/app/uploads
      - backups_oral:/app/backups
      - celerybeat_oral:/app/celerybeat-schedule
      - ./secrets:/run/secrets/sorriso:ro
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mail:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379/0

  postgres:
    image: postgres:16-alpine
    container_name: gestaosaudeoral-postgres
    restart: always
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_oral:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_user -d clinica"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    build:
      context: .
      dockerfile: deploy/backup/Dockerfile
    container_name: gestaosaudeoral-backup
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica_user
      BACKUP_DIR: /backups
      TZ: ${TZ:-America/Maceio}
    volumes:
      - backups_oral:/backups
      - ${UPLOADS_HOST_PATH:-/srv/gestaosaudeoral/uploads}:/uploads:ro
      - ${RCLONE_CONFIG_HOST_PATH:?Configure RCLONE_CONFIG_HOST_PATH no .env}:/config/rclone/rclone.conf
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /backups/LAST_SUCCESS -mmin -2160 -print -quit | grep -q ."]
      interval: 30m
      timeout: 10s
      retries: 3
      start_period: 10m

volumes:
  redis_data_oral:
  pdf_temp_oral:
  postgres_data_oral:
  logs_oral:
  backups_oral:
  celerybeat_oral:
