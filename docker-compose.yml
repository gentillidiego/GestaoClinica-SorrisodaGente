services:
  gestaoclinica:
    build: .
    container_name: gestaosaudeoral-web
    restart: always
    ports:
      - "5003:5002"
    volumes:
      - logs_oral:/app/logs
      - uploads_oral:/app/uploads
      - pdf_temp_oral:/app/pdf_temp
      - backups_oral:/app/backups
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    container_name: gestaosaudeoral-redis
    restart: always
    volumes:
      - redis_data_oral:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    container_name: gestaosaudeoral-celery
    restart: always
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=2
    volumes:
      - pdf_temp_oral:/app/pdf_temp
      - logs_oral:/app/logs
      - uploads_oral:/app/uploads
      - backups_oral:/app/backups
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0

  celery-beat:
    build: .
    container_name: gestaosaudeoral-beat
    restart: always
    command: celery -A celery_app.celery beat --loglevel=info --schedule=/app/celerybeat-schedule/celerybeat-schedule
    volumes:
      - pdf_temp_oral:/app/pdf_temp
      - logs_oral:/app/logs
      - uploads_oral:/app/uploads
      - backups_oral:/app/backups
      - celerybeat_oral:/app/celerybeat-schedule
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0

  postgres:
    image: postgres:16-alpine
    container_name: gestaosaudeoral-postgres
    restart: always
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_oral:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica_user -d clinica"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data_oral:
  pdf_temp_oral:
  postgres_data_oral:
  logs_oral:
  uploads_oral:
  backups_oral:
  celerybeat_oral:
